services:
  postgres:
    container_name: rscale_postgres
    image: postgres:18.3-alpine
    restart: unless-stopped
    expose:
      - 5432
    environment:
      - POSTGRES_DB=rscale
      - POSTGRES_USER=rscale
      - POSTGRES_PASSWORD=${RSCALE_POSTGRES_PASSWORD:-change-me}
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rscale -d rscale"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  rscale:
    container_name: rscale
    image: ghcr.io/lvillis/rscale:latest
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"
      - "3478:3478/udp"
    environment:
      - RSCALE_CONFIG=/app/config/config.toml
      - RSCALE_DATABASE_URL=postgres://rscale:${RSCALE_POSTGRES_PASSWORD:-change-me}@postgres:5432/rscale
    volumes:
      - config.toml:/app/config/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
