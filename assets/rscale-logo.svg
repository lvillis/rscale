<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">rscale</title>
  <desc id="desc">rscale logo with an abstract control-plane network mark and wordmark.</desc>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #24292f;
      --muted: #57606a;
      --stroke: #1f2937;
      --accent: #5b6df7;
      --soft: #dfe5ff;
      --core: #0f172a;
      --core-dot: rgba(255, 255, 255, 0.94);
    }

    .fg { fill: var(--fg); }
    .muted { fill: var(--muted); }
    .stroke { stroke: var(--stroke); }
    .accent { fill: var(--accent); }
    .accent-stroke { stroke: var(--accent); }
    .soft { fill: var(--soft); }
    .core { fill: var(--core); }
    .core-dot { fill: var(--core-dot); }

    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f0f6fc;
        --muted: #8b949e;
        --stroke: #e6edf3;
        --accent: #8ea2ff;
        --soft: #24314f;
        --core: #f0f6fc;
        --core-dot: rgba(13, 17, 23, 0.96);
      }
    }
  </style>

  <g transform="translate(18 20)">
    <rect x="34" y="34" width="88" height="88" rx="28" class="soft"/>
    <path d="M56 49L78 71" class="stroke" stroke-width="6" stroke-linecap="round"/>
    <path d="M56 107L78 89" class="stroke" stroke-width="6" stroke-linecap="round"/>
    <path d="M100 80H126" class="accent-stroke" stroke-width="6" stroke-linecap="round"/>
    <circle cx="50" cy="44" r="10" class="core"/>
    <circle cx="50" cy="112" r="10" class="core"/>
    <circle cx="136" cy="80" r="12" class="accent"/>
    <circle cx="88" cy="80" r="14" class="accent"/>
    <circle cx="88" cy="80" r="5" class="core-dot"/>
  </g>

  <g transform="translate(190 58)">
    <text x="0" y="44" class="fg" font-size="56" font-weight="700" letter-spacing="-2.2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">rscale</text>
    <text x="2" y="78" class="muted" font-size="18" font-weight="500" letter-spacing="0.2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">self-hosted control plane in Rust</text>
  </g>
</svg>
