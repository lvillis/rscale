  <path d="M23 21L29.5 27.5" stroke="var(--stroke)" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M23 43L29.5 36.5" stroke="var(--stroke)" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M37.5 32H43.5" stroke="var(--accent)" stroke-width="3.4" stroke-linecap="round"/>
  <circle cx="21" cy="19" r="3.8" fill="var(--core)"/>
